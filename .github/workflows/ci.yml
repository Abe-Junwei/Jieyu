name: CI

# Slim PR/push gate. Heavy regressions (vertical-view shards, FF/WebKit E2E)
# run nightly via .github/workflows/nightly.yml. Milestone gates (M2–M14),
# release-evidence, collaboration, timeline-CQRS, otel, build, ISO baselines
# run on release tags / manual dispatch via .github/workflows/release-gates.yml.
# Rationale + scope: docs/execution/plans/单人AI协作改进计划-拍板决策-2026-05-11.md §四.

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ONNXRUNTIME_NODE_INSTALL: skip
  npm_config_onnxruntime_node_install: skip

jobs:
  docs-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Docs governance
        run: npm run check:docs-governance
      - name: Docs link debt report
        run: npm run report:docs-link-debt

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: ESLint (strict, warnings fail)
        run: npm run lint:ci
      - name: Knip cleanup gate
        run: npm run check:knip:ci
      - name: Acceptance-1 (AI structural rollback smoke)
        run: npm run check:acceptance-1
      - name: Structural / contract / a11y / i18n checks
        run: npm run check:all
      - name: Vitest suite
        run: npm run test:vitest
      - name: Architecture hotspot report
        run: npm run report:architecture-hotspots

  agent-evals-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Agent evals (smoke, L1 pre-merge)
        run: npm run check:agent-evals:smoke
