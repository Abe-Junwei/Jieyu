      - name: M7 extension gate (enforce)
        run: npm run gate:m7-extension

  release-evidence-core-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export release evidence AI audit input
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
        run: npm run export:release-evidence:ai-audit

      - name: Export release evidence extension capability audit input
        env:
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run export:release-evidence:extension-audit

      - name: Release evidence core gate (enforce)
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
          RELEASE_EVIDENCE_REQUIRE_COST_GUARD_TREND_READY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_cost_guard_trend_ready == 'true' }}
        run: npm run gate:release-evidence:core

      - name: Release evidence governance gate (core)
        env:
          REQUIRE_COST_GUARD_TREND_READY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_cost_guard_trend_ready == 'true' }}
          REQUIRE_ACTION_APPROVAL_STRICT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_action_approval_strict == 'true' }}
        run: |
          if [ "${REQUIRE_COST_GUARD_TREND_READY}" = "true" ] || [ "${REQUIRE_ACTION_APPROVAL_STRICT}" = "true" ]; then
            npm run gate:release-evidence:governance:strict
          else
            npm run gate:release-evidence:governance
          fi

      - name: Summarize release evidence gates (core)
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (!summaryPath) process.exit(0);

          const dir = path.join(process.cwd(), 'docs', 'execution', 'release-gates', 'release-evidence');
          if (!fs.existsSync(dir)) {
            fs.appendFileSync(summaryPath, '## Release Evidence CostGuard Trend (core)\n\nNo release-evidence directory found.\n');
            process.exit(0);
          }

          const candidates = fs.readdirSync(dir)
            .filter((name) => /^release-evidence-\d{8}-\d{6}-core\.json$/.test(name))
            .map((name) => {
              const fullPath = path.join(dir, name);
              return { name, fullPath, mtimeMs: fs.statSync(fullPath).mtimeMs };
            })
            .sort((a, b) => b.mtimeMs - a.mtimeMs);

          if (candidates.length === 0) {
            fs.appendFileSync(summaryPath, '## Release Evidence CostGuard Trend (core)\n\nNo core release-evidence artifact found.\n');
            process.exit(0);
          }

          const latest = candidates[0];
          const payload = JSON.parse(fs.readFileSync(latest.fullPath, 'utf8'));
          const trend = payload?.costGuard?.trend;
          const actionApproval = payload?.actionApprovalCenter;
          const compareReady = trend?.compareReady === true ? 'true' : 'false';
          const pointCount = Number.isFinite(Number(trend?.pointCount)) ? String(trend.pointCount) : '0';
          const requirement = payload?.metadata?.costGuardTrendRequirement ?? 'none';
          const pending = Number.isFinite(Number(actionApproval?.summary?.pending)) ? String(actionApproval.summary.pending) : '0';
          const blocked = Number.isFinite(Number(actionApproval?.summary?.blocked)) ? String(actionApproval.summary.blocked) : '0';
          const confirmed = Number.isFinite(Number(actionApproval?.summary?.confirmed)) ? String(actionApproval.summary.confirmed) : '0';
          const failed = Number.isFinite(Number(actionApproval?.summary?.failed)) ? String(actionApproval.summary.failed) : '0';

          fs.appendFileSync(
            summaryPath,
            [
              '## Release Evidence Gates (core)',
              '',
              `- Artifact: ${path.relative(process.cwd(), latest.fullPath)}`,
              `- actionApproval.pending: ${pending}`,
              `- actionApproval.blocked: ${blocked}`,
              `- actionApproval.confirmed: ${confirmed}`,
              `- actionApproval.failed: ${failed}`,
              `- compareReady: ${compareReady}`,
              `- pointCount: ${pointCount}`,
              `- requirement: ${requirement}`,
              '',
            ].join('\n'),
          );
          NODE

      - name: Upload release evidence artifacts (core)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-core-${{ github.run_id }}
          path: |
            docs/execution/release-gates/release-evidence/release-evidence-*.json
            docs/execution/release-gates/release-evidence/logs/**/*.log
          if-no-files-found: warn
          retention-days: 14

  release-evidence-full-gate:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_evidence_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export release evidence AI audit input
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
        run: npm run export:release-evidence:ai-audit

      - name: Export release evidence extension capability audit input
        env:
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run export:release-evidence:extension-audit

      - name: Release evidence full gate (enforce)
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
          RELEASE_EVIDENCE_REQUIRE_COST_GUARD_TREND_READY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_cost_guard_trend_ready == 'true' }}
        run: npm run gate:release-evidence:full

      - name: Release evidence governance gate (full)
        env:
          REQUIRE_COST_GUARD_TREND_READY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_cost_guard_trend_ready == 'true' }}
          REQUIRE_ACTION_APPROVAL_STRICT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_action_approval_strict == 'true' }}
        run: |
          if [ "${REQUIRE_COST_GUARD_TREND_READY}" = "true" ] || [ "${REQUIRE_ACTION_APPROVAL_STRICT}" = "true" ]; then
            node scripts/generate-release-evidence-bundle.mjs --profile=full --dry-run --ai-audit-export=docs/execution/release-gates/release-evidence/release-evidence-governance-strict-seed.ndjson --output=docs/execution/release-gates/release-evidence/release-evidence-governance-gate-full.json && \
            node scripts/check-release-evidence-governance.mjs --report=docs/execution/release-gates/release-evidence/release-evidence-governance-gate-full.json --require-cost-guard-compare-ready --max-pending-rate=0.70 --max-blocked-rate=0.80 --max-failed-rate=0.20 --require-high-risk-signal
          else
            node scripts/generate-release-evidence-bundle.mjs --profile=full --dry-run --output=docs/execution/release-gates/release-evidence/release-evidence-governance-gate-full.json && \
            node scripts/check-release-evidence-governance.mjs --report=docs/execution/release-gates/release-evidence/release-evidence-governance-gate-full.json
          fi

      - name: Summarize release evidence gates (full)
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          if (!summaryPath) process.exit(0);

          const dir = path.join(process.cwd(), 'docs', 'execution', 'release-gates', 'release-evidence');
          if (!fs.existsSync(dir)) {
            fs.appendFileSync(summaryPath, '## Release Evidence CostGuard Trend (full)\n\nNo release-evidence directory found.\n');
            process.exit(0);
          }

          const candidates = fs.readdirSync(dir)
            .filter((name) => /^release-evidence-\d{8}-\d{6}-full\.json$/.test(name))
            .map((name) => {
              const fullPath = path.join(dir, name);
              return { name, fullPath, mtimeMs: fs.statSync(fullPath).mtimeMs };
            })
            .sort((a, b) => b.mtimeMs - a.mtimeMs);

          if (candidates.length === 0) {
            fs.appendFileSync(summaryPath, '## Release Evidence CostGuard Trend (full)\n\nNo full release-evidence artifact found.\n');
            process.exit(0);
          }

          const latest = candidates[0];
          const payload = JSON.parse(fs.readFileSync(latest.fullPath, 'utf8'));
          const trend = payload?.costGuard?.trend;
          const actionApproval = payload?.actionApprovalCenter;
          const compareReady = trend?.compareReady === true ? 'true' : 'false';
          const pointCount = Number.isFinite(Number(trend?.pointCount)) ? String(trend.pointCount) : '0';
          const requirement = payload?.metadata?.costGuardTrendRequirement ?? 'none';
          const pending = Number.isFinite(Number(actionApproval?.summary?.pending)) ? String(actionApproval.summary.pending) : '0';
          const blocked = Number.isFinite(Number(actionApproval?.summary?.blocked)) ? String(actionApproval.summary.blocked) : '0';
          const confirmed = Number.isFinite(Number(actionApproval?.summary?.confirmed)) ? String(actionApproval.summary.confirmed) : '0';
          const failed = Number.isFinite(Number(actionApproval?.summary?.failed)) ? String(actionApproval.summary.failed) : '0';

          fs.appendFileSync(
            summaryPath,
            [
              '## Release Evidence Gates (full)',
              '',
              `- Artifact: ${path.relative(process.cwd(), latest.fullPath)}`,
              `- actionApproval.pending: ${pending}`,
              `- actionApproval.blocked: ${blocked}`,
              `- actionApproval.confirmed: ${confirmed}`,
              `- actionApproval.failed: ${failed}`,
              `- compareReady: ${compareReady}`,
              `- pointCount: ${pointCount}`,
              `- requirement: ${requirement}`,
              '',
            ].join('\n'),
          );
          NODE

      - name: Upload release evidence artifacts (full)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-full-${{ github.run_id }}
          path: |
            docs/execution/release-gates/release-evidence/release-evidence-*.json
            docs/execution/release-gates/release-evidence/logs/**/*.log
          if-no-files-found: warn
          retention-days: 14

  m8-collaboration-gate:
