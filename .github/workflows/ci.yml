name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      run_release_evidence_full:
        description: 'Run full release evidence gate (can be long-running)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iso6393-country-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify committed ISO 639-3 country baselines artifact
        run: npm run verify:iso6393-country-baselines

  docs-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docs governance
        run: npm run check:docs-governance

      - name: Docs link debt report
        run: npm run report:docs-link-debt

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit (advisory; does not block merge)
        continue-on-error: true
        run: npm run audit:prod

      - name: CSS backdrop-compat (per-file; fast fail before full test)
        run: npm run check:css-compat

      - name: Type check
        run: npm run typecheck

      - name: fireAndForget governance (context on all callsites)
        run: npm run check:fire-and-forget-governance

      - name: Test suite
        run: npm test

      - name: Architecture hotspot report
        run: npm run report:architecture-hotspots

  otel-contract-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: OTel contract smoke
        run: npm run test:otel-contract

  timeline-phase1-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Timeline phase1 gate
        run: npm run gate:timeline-phase1

  timeline-cqrs-full-migration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Timeline CQRS full migration gate
        run: npm run gate:timeline-cqrs-full-migration

  m2-mainpath-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M2 mainpath gate
        run: npm run gate:m2

  m5-observability-gate:
    name: M5 observability gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M5 observability gate
        run: npm run gate:m5-observability

  m6-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M6 release gate (enforce)
        run: npm run gate:m6-release

  m7-extension-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M7 extension gate (enforce)
        run: npm run gate:m7-extension

  release-evidence-core-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export release evidence AI audit input
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
        run: npm run export:release-evidence:ai-audit

      - name: Export release evidence extension capability audit input
        env:
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run export:release-evidence:extension-audit

      - name: Release evidence core gate (enforce)
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run gate:release-evidence:core

      - name: Upload release evidence artifacts (core)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-core-${{ github.run_id }}
          path: |
            docs/execution/release-gates/release-evidence/release-evidence-*.json
            docs/execution/release-gates/release-evidence/logs/**/*.log
          if-no-files-found: warn
          retention-days: 14

  release-evidence-full-gate:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_evidence_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export release evidence AI audit input
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
        run: npm run export:release-evidence:ai-audit

      - name: Export release evidence extension capability audit input
        env:
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run export:release-evidence:extension-audit

      - name: Release evidence full gate (enforce)
        env:
          RELEASE_EVIDENCE_AI_REQUEST_IDS: toolreq_runtime_ci_001
          RELEASE_EVIDENCE_AI_AUDIT_EXPORT: docs/execution/audits/ai-tool-decision-audit-export-v1.ndjson
          RELEASE_EVIDENCE_EXTENSION_CAPABILITY_AUDIT_EXPORT: docs/execution/audits/extension-capability-audit-export-v1.ndjson
        run: npm run gate:release-evidence:full

      - name: Upload release evidence artifacts (full)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-full-${{ github.run_id }}
          path: |
            docs/execution/release-gates/release-evidence/release-evidence-*.json
            docs/execution/release-gates/release-evidence/logs/**/*.log
          if-no-files-found: warn
          retention-days: 14

  m8-collaboration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M8 collaboration gate (enforce)
        run: npm run gate:m8-collaboration

  m9-collaboration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M9 collaboration gate (enforce)
        run: npm run gate:m9-collaboration

  m10-collaboration-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M10 collaboration gate (enforce)
        run: npm run gate:m10-collaboration

  m11-cross-device-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M11 cross-device gate (enforce)
        run: npm run gate:m11-cross-device

  m12-multi-replica-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M12 multi-replica gate (enforce)
        run: npm run gate:m12-multi-replica

  m13-transaction-sync-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: M13 transaction sync gate (enforce)
        run: npm run gate:m13-transaction-sync

  greenfield-local-gate:
    name: Greenfield local gate (no Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Greenfield local gate
        run: npm run gate:greenfield-local

  collaboration-cloud-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Collaboration cloud gate (enforce)
        run: npm run gate:collaboration-cloud

  build-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build guard
        run: npm run build:guard

  e2e-critical-paths-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E (Chromium only on PR)
        run: npm run test:e2e:chromium

  e2e-critical-paths-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build
        run: npm run build

      - name: Run E2E (Chromium + Firefox + WebKit)
        run: npm run test:e2e