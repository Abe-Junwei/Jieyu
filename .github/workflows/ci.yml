name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      run_release_evidence_full:
        description: 'Run full release evidence gate (can be long-running)'
        required: false
        default: false
        type: boolean
      require_cost_guard_trend_ready:
        description: 'Enable strict release-evidence compareReady gate for costGuard.trend'
        required: false
        default: false
        type: boolean
      require_action_approval_strict:
        description: 'Enable strict release-evidence action approval gate'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iso6393-country-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify committed ISO 639-3 country baselines artifact
        run: npm run verify:iso6393-country-baselines

  docs-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docs governance
        run: npm run check:docs-governance

      - name: Docs link debt report
        run: npm run report:docs-link-debt

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit (advisory; does not block merge)
        continue-on-error: true
        run: npm run audit:prod

      - name: CSS backdrop-compat (per-file; fast fail before full test)
        run: npm run check:css-compat

      - name: Type check
        run: npm run typecheck

      - name: fireAndForget governance (context on all callsites)
        run: npm run check:fire-and-forget-governance

      - name: Test suite
        run: npm test

      - name: Architecture hotspot report
        run: npm run report:architecture-hotspots

  agent-evals-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Agent evals gate (enforce)
        run: npm run check:agent-evals

      - name: Upload agent eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evals-report-${{ github.run_id }}
          path: docs/execution/release-gates/release-evidence/agent-evals-report.json
          if-no-files-found: warn
          retention-days: 14

  otel-contract-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: OTel contract smoke
        run: npm run test:otel-contract

  timeline-phase1-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
