name: Lint Governance Weekly

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

concurrency:
  group: lint-governance-weekly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-governance-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict ESLint scan
        run: npm run lint:governance:scan
